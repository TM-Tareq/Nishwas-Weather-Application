# Spring Boot Application Configuration
# Nishwas — Bangladesh Weather Platform Backend

spring:
  application:
    name: backend

  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/nishwas?useSSL=false&serverTimezone=Asia/Dhaka&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234509876
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        '[jdbc.time_zone]': Asia/Dhaka

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Logging Configuration
logging:
  level:
    com.nishwas.backend: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG